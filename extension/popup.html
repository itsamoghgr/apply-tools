<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cover Letter Generator</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Apply Tools</h1>
      <div class="health" id="health" title="Backend status">
        <span class="dot" id="healthDot"></span>
        <span class="health-label" id="healthLabel">checking...</span>
      </div>
    </header>

    <div class="resume-bar">
      <label for="resumeSelect">Resume</label>
      <select id="resumeSelect" aria-label="Active resume">
        <option value="default">Loading...</option>
      </select>
    </div>

    <div class="autodetect-bar" id="autodetectBar">
      <button
        type="button"
        id="autoDetectBtn"
        title="Detect company + JD from the active tab"
      >
        Auto-detect from page
      </button>
      <span
        id="autoDetectStatus"
        class="autodetect-status"
        role="status"
        aria-live="polite"
      ></span>
    </div>

    <nav class="tabs" role="tablist">
      <button
        type="button"
        class="tab active"
        role="tab"
        data-tab="cover"
        aria-selected="true"
      >
        Cover Letter
      </button>
      <button type="button" class="tab" role="tab" data-tab="email" aria-selected="false">
        Email
      </button>
      <button type="button" class="tab" role="tab" data-tab="outreach" aria-selected="false">
        Outreach
      </button>
      <button type="button" class="tab" role="tab" data-tab="score" aria-selected="false">
        Score
      </button>
      <button type="button" class="tab" role="tab" data-tab="question" aria-selected="false">
        Question
      </button>
      <button type="button" class="tab" role="tab" data-tab="track" aria-selected="false">
        Track
      </button>
    </nav>

    <!-- ============ Cover Letter tab ============ -->
    <section class="panel active" data-panel="cover">
      <form id="coverForm" autocomplete="off">
        <label for="cover-company">Company</label>
        <input
          type="text"
          id="cover-company"
          placeholder="Anthropic"
          required
          maxlength="200"
        />

        <label for="cover-jd">Job description</label>
        <textarea
          id="cover-jd"
          placeholder="Paste the full JD here..."
          required
          rows="9"
          maxlength="20000"
        ></textarea>

        <div class="cover-actions">
          <button type="submit" id="coverSubmit">Generate PDF</button>
          <button type="button" id="coverTextBtn" class="btn-secondary">Generate text</button>
        </div>
      </form>
      <div id="coverScore" class="score-display compact hidden">
        <div class="score-number-wrap">
          <span class="score-number">-</span><span class="score-denom">/10</span>
        </div>
        <div class="score-verdict"></div>
      </div>
      <div id="coverStatus" class="status" role="status" aria-live="polite"></div>

      <div id="coverTextResult" class="result hidden">
        <div class="result-row">
          <label for="cover-body-out">Cover letter</label>
          <button type="button" class="copy-btn" data-copy="cover-body-out">Copy</button>
        </div>
        <textarea id="cover-body-out" rows="16"></textarea>
      </div>
    </section>

    <!-- ============ Email tab ============ -->
    <section class="panel" data-panel="email">
      <form id="emailForm" autocomplete="off">
        <label for="email-company">Company</label>
        <input
          type="text"
          id="email-company"
          placeholder="Anthropic"
          required
          maxlength="200"
        />

        <label for="email-jd">Job description</label>
        <textarea
          id="email-jd"
          placeholder="Paste the full JD here..."
          required
          rows="7"
          maxlength="20000"
        ></textarea>

        <label for="email-intent">
          What is this email for? <span class="hint">(optional)</span>
        </label>
        <textarea
          id="email-intent"
          placeholder="e.g. asking the recruiter to consider me for this role"
          rows="2"
          maxlength="2000"
        ></textarea>

        <button type="submit" id="emailSubmit">Generate email</button>
      </form>

      <div id="emailStatus" class="status" role="status" aria-live="polite"></div>

      <div id="emailResult" class="result hidden">
        <div class="result-row">
          <label for="email-subject-out">Subject</label>
          <button type="button" class="copy-btn" data-copy="email-subject-out">Copy</button>
        </div>
        <input type="text" id="email-subject-out" readonly />

        <div class="result-row">
          <label for="email-body-out">Body</label>
          <button type="button" class="copy-btn" data-copy="email-body-out">Copy</button>
        </div>
        <textarea id="email-body-out" rows="12"></textarea>
      </div>
    </section>

    <!-- ============ Outreach tab ============ -->
    <section class="panel" data-panel="outreach">
      <form id="outreachForm" autocomplete="off">
        <label for="outreach-channel">Channel</label>
        <select id="outreach-channel" required>
          <option value="linkedin_invitation">LinkedIn invitation (~280 chars)</option>
          <option value="linkedin_message">LinkedIn message / InMail</option>
          <option value="email">Email</option>
        </select>

        <label for="outreach-profile">
          Their LinkedIn profile <span class="hint">(paste text)</span>
        </label>
        <textarea
          id="outreach-profile"
          placeholder="Paste their profile: name, headline, current role, recent experience, posts they've written..."
          required
          rows="7"
          maxlength="30000"
        ></textarea>

        <label for="outreach-context">
          What is this about? <span class="hint">(optional)</span>
        </label>
        <textarea
          id="outreach-context"
          placeholder="e.g. asking for a referral at their company / interested in their work on X / want a 15-min chat about Y"
          rows="2"
          maxlength="2000"
        ></textarea>

        <button type="submit" id="outreachSubmit">Generate message</button>
      </form>

      <div id="outreachStatus" class="status" role="status" aria-live="polite"></div>

      <div id="outreachResult" class="result hidden">
        <div class="result-row" id="outreachSubjectRow" style="display: none;">
          <label for="outreach-subject-out">Subject</label>
          <button type="button" class="copy-btn" data-copy="outreach-subject-out">Copy</button>
        </div>
        <input type="text" id="outreach-subject-out" readonly style="display: none;" />

        <div class="result-row">
          <label for="outreach-message-out">Message</label>
          <span id="outreachCharCount" class="char-count"></span>
          <button type="button" class="copy-btn" data-copy="outreach-message-out">Copy</button>
        </div>
        <textarea id="outreach-message-out" rows="10"></textarea>
      </div>
    </section>

    <!-- ============ Score tab ============ -->
    <section class="panel" data-panel="score">
      <form id="scoreForm" autocomplete="off">
        <label for="score-company">
          Company <span class="hint">(optional)</span>
        </label>
        <input
          type="text"
          id="score-company"
          placeholder="Anthropic"
          maxlength="200"
        />

        <label for="score-jd">Job description</label>
        <textarea
          id="score-jd"
          placeholder="Paste the JD - score appears in ~3-5s"
          required
          rows="10"
          maxlength="20000"
        ></textarea>

        <button type="submit" id="scoreSubmit">Score against all resumes</button>
      </form>

      <div id="scoreStatus" class="status" role="status" aria-live="polite"></div>

      <div id="scoreList" class="score-list hidden"></div>
    </section>

    <!-- ============ Question tab ============ -->
    <section class="panel" data-panel="question">
      <form id="questionForm" autocomplete="off">
        <label for="question-company">Company</label>
        <input
          type="text"
          id="question-company"
          placeholder="Anthropic"
          required
          maxlength="200"
        />

        <label for="question-jd">Job description</label>
        <textarea
          id="question-jd"
          placeholder="Paste the full JD here..."
          required
          rows="7"
          maxlength="20000"
        ></textarea>

        <label for="question-text">Application question</label>
        <textarea
          id="question-text"
          placeholder="Paste the application question here..."
          required
          rows="4"
          maxlength="4000"
        ></textarea>

        <button type="submit" id="questionSubmit">Generate answer</button>
      </form>

      <div id="questionStatus" class="status" role="status" aria-live="polite"></div>

      <div id="questionResult" class="result hidden">
        <div class="result-row">
          <label for="question-answer-out">Answer</label>
          <button type="button" class="copy-btn" data-copy="question-answer-out">Copy</button>
        </div>
        <textarea id="question-answer-out" rows="12"></textarea>
      </div>
    </section>

    <!-- ============ Track tab ============ -->
    <section class="panel" data-panel="track">
      <form id="trackForm" autocomplete="off">
        <label for="track-company">Company</label>
        <input
          type="text"
          id="track-company"
          placeholder="Anthropic"
          required
          maxlength="200"
        />

        <label for="track-role">Job role</label>
        <input
          type="text"
          id="track-role"
          placeholder="Senior ML Engineer"
          maxlength="200"
        />

        <label for="track-location">Location</label>
        <input
          type="text"
          id="track-location"
          placeholder="San Francisco, CA / Remote"
          maxlength="200"
        />

        <label for="track-job-url">Job URL</label>
        <input
          type="url"
          id="track-job-url"
          placeholder="Auto-fills from page URL on detect"
          maxlength="2000"
        />

        <div class="track-row">
          <div class="track-cell">
            <label for="track-status">Status</label>
            <select id="track-status">
              <option value="Applied" selected>Applied</option>
              <option value="In-Progress">In-Progress</option>
              <option value="Offer">Offer</option>
              <option value="Rejected">Rejected</option>
              <option value="Withdrawn">Withdrawn</option>
              <option value="Ghosted">Ghosted</option>
            </select>
          </div>
          <div class="track-cell">
            <label for="track-applied-date">Applied date</label>
            <input type="date" id="track-applied-date" />
          </div>
        </div>

        <label for="track-interview">Interview status</label>
        <select id="track-interview">
          <option value="" selected>(none)</option>
          <option value="Assessment">Assessment</option>
          <option value="Interviewing">Interviewing</option>
          <option value="Offer">Offer</option>
          <option value="Rejected">Rejected</option>
        </select>

        <label for="track-notes">Notes</label>
        <textarea
          id="track-notes"
          placeholder="Anything to remember about this one..."
          rows="3"
          maxlength="10000"
        ></textarea>

        <details class="track-jd-details">
          <summary>Job description (auto-detected)</summary>
          <textarea
            id="track-jd"
            placeholder="Auto-fills when you click 'Auto-detect from page'..."
            rows="6"
            maxlength="40000"
          ></textarea>
        </details>

        <button type="submit" id="trackSubmit">Save to tracker</button>
      </form>
      <div id="trackStatus" class="status" role="status" aria-live="polite"></div>
    </section>

    <script src="popup.js"></script>
  </body>
</html>
